<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 6 - Lesson 04</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <h1>custom form validation</h1>
    <form action="#" method="get" class="js-form">
        <div>
            <label for="email">
                E-mail:
                <input type="email" name="email" id="email" value="" required class="js-email">
            </label>
        </div>
        <div>
        <label for="TOC">
            <input type="checkbox" name="TOC" id="TOC" class="js-tc">
            I accept the terms and conditions.
        </label>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
    <h2>generic settings for terms and conditions acceptance</h2>
    <div>
        <button class="js-always-accept">I always accept the T&C</button>
        <button class="js-never-accept">I never accept the T&C by default</button>
        <button class="js-allow-free-text-email">Allow email as free text (just once)</button>
    </div>
    <script src="js.js"></script>
</body>
</html>
