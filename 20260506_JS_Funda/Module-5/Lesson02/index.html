<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 5 Lesson 02</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <h1>ToDo Form</h1>
    <form action="#" method="get" class="js-form"">
        <div class="form-row">
            <label for="todo-name">ToDo Item Name</label>
            <input type="text" name="todo-name" />
        </div>
        <div class="form-row">
            <label for="todo-deadline">ToDo Target Date</label>
            <input type="date" name="todo-deadline" id="dateButton">
        </div>
        <button type="submit">Add</button>
        <div class="form-row error js-error-container">
            
        </div>
    </form>
    <section class="js-container"></section>
    <script src="js.js"></script>
</body>
</html>
