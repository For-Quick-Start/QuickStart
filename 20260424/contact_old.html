<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
    <title>Contact</title>
</head>
<body>
    <h1>Contact</h1>
    <form action="#" method="get">
        <div class="form-row">
            <label>
                First Name:
                <input type="text" name="first-name" id="first-name" placeholder="Your first name" required>
            </label>
        </div>
        <div class="form-row">
            <label>
                Last Name:
                <input type="text" name="last-name" id="last-name" placeholder="Your last name" required>
            </label>
        </div>
        <div class="form-row">
            <label>
                Email:
                <input type="email" name="email" id="email" placeholder="Your email address" required>
            </label>
        </div>
        <div class="form-row">
            <label>
                Phone:
                <input type="tel" name="tel" id="tel" placeholder="###-###-####" required pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
            </label>
        </div>
        <div class="form-row">
            <label>
                Message:
                <textarea name="message" id="message"></textarea>
            </label>
        </div>
        <div class="form-row">
            <label>
                Gender:
                <select name="gender">
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="other">Other</option>
                    <option value="do-not-disclose">Do not disclose</option>
                </select>
            </label>
        </div>
        <div class="form-row">
            <fieldset>
                <legend>Topic</legend>
                <label>
                    <input type="radio" name="topic" value="HTML">
                    HTML
                </label>
                <label>
                    <input type="radio" name="topic" value="CSS">
                    CSS
                </label>
                <label>
                    <input type="radio" name="topic" value="JS">
                    JavaScript
                </label>
            </fieldset>
        </div>
        <div class="form-row">
            <fieldset>
                <legend>Request</legend>
                <label>
                    <input type="checkbox" name="advice">
                    Advice
                </label>
                <label>
                    <input type="checkbox" name="information">
                    Information
                </label>
                <label>
                    <input type="checkbox" name="motivation">
                    Motivation
                </label>
            </fieldset>
        </div>
        <div class="form-row">
            <label>
                Urgency: 0 - 10
                <input type="range" min="0" max="10" class="js-urgency" value="0">
            </label>
            <input type="text" disabled value="0" class="js-urgency-value">
        </div>
        <div class="form-row">
            <input type="submit" value="Send">
            <!--<button type="submit">Send</button>-->
            <!--<button type="reset">Reset</button>-->
            <input type="reset" value="Clear">
        </div>
        <script src="./urgency.js"></script>
    </form>
    <video src="./video/bars.mkv" height="200" controls></video>
    <audio src="./audio/righteous.mp3" controls></audio>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OpZKTd1L3Xc?si=Lufi0pTeH30lbrCB" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
